name: Update flake lockfile

on:
  workflow_dispatch:
    inputs:
      force-rebuild:
        type: boolean
        default: false

  schedule:
    - cron: "0 0 * * 3,6"

permissions:
  contents: write

jobs:
  build:
    name: "update flake lockfiles & upload to my binary cache"
    runs-on: ${{ matrix.platform.on }}
    strategy:
      fail-fast: false
      matrix:
        platform: 
          - on: ubuntu-latest 
            name: x86_64
          - on: ubuntu-24.04-arm 
            name: aarch64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Tailscale
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci
          
    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-25.11
        extra_nix_config: |
          extra-substituters = http://cache.crys
          extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
          connect-timeout = 30
          fallback = true
          post-build-hook = /tmp/post-build-hook.sh

    - name: Update flake inputs
      id: check-updates
      run: |
        nix flake update 2>&1 | tee /tmp/update-output.txt
        {
          echo "output<<FLAKE_UPDATE_END"
          cat /tmp/update-output.txt
          echo "FLAKE_UPDATE_END"
        } >> $GITHUB_OUTPUT
        nix flake update
        if [[ -z "$(git status -s)" ]]; then
          echo "updated=0" >> "$GITHUB_OUTPUT"
          echo "Nothing updated. Nothing needs to be done."
        else
          echo "updated=1" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up post build hook
      if: >-
        steps.check-updates.outputs.updated == '1' ||
        github.event.inputs.force-rebuild == 'true'
      run: |
        cat > /tmp/post-build-hook.sh << EOF
        set -euf
        if [ -n "$OUT_PATHS" ]; then
          echo "Uploading paths" $OUT_PATHS
          NIX_SSHOPTS="-o StrictHostKeyChecking=no" nix copy --to "ssh://nixremote@mingzhu" $OUT_PATHS
        fi
        EOF
        chmod +x /tmp/post-build-hook.sh

    - name: Build & Upload
      if: >-
        steps.check-updates.outputs.updated == '1' ||
        github.event.inputs.force-rebuild == 'true'
      run: nix build .# --no-link --print-out-paths -L

    - name: Commit
      if: >-
        steps.check-updates.outputs.updated == '1' ||
        github.event.inputs.force-rebuild == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        default_author: github_actions
        push: true
        message: |
          chore: update flake (automated)

          ${{ steps.check-update.outputs.output }}
