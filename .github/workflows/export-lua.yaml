name: Export Pure Lua Config

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
      - README.md
  pull_request:
    paths-ignore:
      - .github/**
      - README.md

permissions:
  contents: read

jobs:
  export:
    name: "Export init.lua"
    runs-on: ${{ matrix.runner.tag }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - arch: x86_64
            tag: ubuntu-latest
          - arch: aarch64
            tag: ubuntu-latest-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up post build hook
        run: |
          cat > /tmp/post-build-hook.sh << EOF
          set -euf
          if [ -n "$OUT_PATHS" ]; then
          echo "Uploading paths" $OUT_PATHS
          NIX_SSHOPTS="-o StrictHostKeyChecking=no" nix copy --to "ssh://nixremote@mingzhu" $OUT_PATHS
          fi
          EOF
          chmod +x /tmp/post-build-hook.sh
            
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-26.05
          extra_nix_config: |
            extra-substituters = http://cache.crys
            extra-trusted-public-keys = mingzhu:V0KsUipFnrBNsfUD8VI0rFXQpgE3KKJfRby9Jm8cLTQ=
            connect-timeout = 30
            fallback = true
            post-build-hook = /tmp/post-build-hook.sh
            access-tokens = github.com=${{ secrets.GH_TOKEN }}

      - name: Build
        run: |
          nix build .#lua -L
          mkdir -p ./export
          cp -R ./result/. ./export/

      - name: Upload exported Lua config
        uses: https://github.com/christopherHX/gitea-upload-artifact@v4
        with:
          name: sanzenvim-lua-${{ matrix.runner.arch }}
          path: |
            export/init.lua
            export/sanzenvim.generated.lua
            export/pack
